backend:
  name: github
  repo: techexpertjc/impumpkin-web
  branch: main
  base_url: https://impumpkin-web.netlify.app

# Local dev: when running `npm run dev`, the CMS auto-detects
# the local proxy server and uses it instead of GitHub
local_backend: true

media_folder: "src/uploads"
public_folder: "/uploads"

i18n:
  structure: multiple_folders
  locales: [en, vi]
  default_locale: en

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  # --- Blog Posts ---
  - name: "posts"
    label: "Blog Posts"
    folder: "src/{{locale}}/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    i18n: true
    sortable_fields: ["date", "title"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        i18n: true

      - label: "Description"
        name: "description"
        widget: "text"
        i18n: true
        hint: "Short summary for SEO and post cards (150-160 characters)"

      - label: "Date"
        name: "date"
        widget: "datetime"
        i18n: duplicate

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        i18n: duplicate
        required: true

      - label: "Featured Image Alt Text"
        name: "featuredImageAlt"
        widget: "string"
        i18n: true

      - label: "Category"
        name: "category"
        widget: "select"
        i18n: duplicate
        options:
          - { label: "Travel", value: "travel" }
          - { label: "Food", value: "food" }
          - { label: "Culture", value: "culture" }
          - { label: "Lifestyle", value: "lifestyle" }
          - { label: "Tips", value: "tips" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        i18n: true

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        i18n: duplicate
        hint: "Show on homepage hero section?"

      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true

  # --- Instagram Embeds ---
  - name: "instagram"
    label: "Instagram Embeds"
    label_singular: "Instagram Embed"
    folder: "src/_data/instagramData"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["order", "title"]
    summary: "{{title}} — {{type}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "A short label for this embed (e.g. 'Taj Mahal Reel')"

      - label: "Instagram URL"
        name: "url"
        widget: "string"
        hint: "Paste the full URL (e.g. https://www.instagram.com/reel/ABC123/)"

      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Reel", value: "reel" }
          - { label: "Post", value: "post" }

      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 0
        hint: "Lower numbers appear first"

  # --- Site Settings ---
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/_data/settings.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Author Name", name: "author", widget: "string" }
          - { label: "Site URL", name: "url", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Threads URL", name: "threads", widget: "string" }
