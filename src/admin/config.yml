backend:
  name: github
  repo: techexpertjc/impumpkin-web
  branch: main
  base_url: https://impumpkin-web.netlify.app
  auth_endpoint: .netlify/functions/auth

media_folder: "src/uploads"
public_folder: "/uploads"

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  # --- Blog Posts (English) ---
  - name: "posts_en"
    label: "Blog Posts (English)"
    folder: "src/en/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Short summary for SEO and post cards (150-160 characters)"

      - label: "Date"
        name: "date"
        widget: "datetime"

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: true

      - label: "Featured Image Alt Text"
        name: "featuredImageAlt"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Travel", value: "travel" }
          - { label: "Food", value: "food" }
          - { label: "Culture", value: "culture" }
          - { label: "Lifestyle", value: "lifestyle" }
          - { label: "Tips", value: "tips" }

      - label: "Tags"
        name: "tags"
        widget: "list"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show on homepage hero section?"

      - label: "Body"
        name: "body"
        widget: "markdown"

  # --- Blog Posts (Vietnamese) ---
  - name: "posts_vi"
    label: "Blog Posts (Vietnamese)"
    folder: "src/vi/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Short summary for SEO and post cards (150-160 characters)"

      - label: "Date"
        name: "date"
        widget: "datetime"

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: true

      - label: "Featured Image Alt Text"
        name: "featuredImageAlt"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Travel", value: "travel" }
          - { label: "Food", value: "food" }
          - { label: "Culture", value: "culture" }
          - { label: "Lifestyle", value: "lifestyle" }
          - { label: "Tips", value: "tips" }

      - label: "Tags"
        name: "tags"
        widget: "list"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show on homepage hero section?"

      - label: "Body"
        name: "body"
        widget: "markdown"

  # --- Instagram Embeds ---
  - name: "instagram"
    label: "Instagram Embeds"
    label_singular: "Instagram Embed"
    folder: "src/_data/instagramData"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["order", "title"]
    summary: "{{title}} — {{type}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "A short label for this embed (e.g. 'Taj Mahal Reel')"

      - label: "Instagram URL"
        name: "url"
        widget: "string"
        hint: "Paste the full URL (e.g. https://www.instagram.com/reel/ABC123/)"

      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Reel", value: "reel" }
          - { label: "Post", value: "post" }

      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 0
        hint: "Lower numbers appear first"

  # --- Site Settings ---
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/_data/settings.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Author Name", name: "author", widget: "string" }
          - { label: "Site URL", name: "url", widget: "string" }
          - label: "Hero Background Image"
            name: "heroImage"
            widget: "image"
            hint: "The parallax background image on the homepage"
          - label: "Profile Picture"
            name: "profileImage"
            widget: "image"
            hint: "Your profile photo (shown in hero section and About page)"
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Threads URL", name: "threads", widget: "string" }
